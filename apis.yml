  - type: Features
    data:
      - name: Unified B2B E-Commerce Platform
        description: >-
          All Watsco operating companies run on a shared technology platform and
          unified data layer, supporting 300 to 400 digital orders per hour
          across 670+ locations.
      - name: Centralized Product Information Management
        description: >-
          A centralized PIM system covers approximately 900,000 SKUs with
          images, descriptions, and up to 40 attributes per product.
      - name: Digital Order Management
        description: >-
          Online order processing for HVAC/R equipment and supplies enabling
          contractors and dealers to place, track, and manage orders digitally.
      - name: Multi-Brand Distribution Network
        description: >-
          Operations under multiple subsidiary brands (Carrier Enterprise, Baker
          Distributing, Gemaire, East Coast Metal Distributors) sharing a
          unified technology backbone.
      - name: Alert Labs Technology Platform
        description: >-
          Alert Labs provides IoT-based water and HVAC monitoring solutions
          integrated with Watsco's distribution capabilities.
  - type: UseCases
    data:
      - name: HVAC Contractor Ordering
        description: >-
          Licensed HVAC contractors use Watsco digital platforms to order
          equipment, parts, and refrigerants for residential and commercial
          installations.
      - name: Dealer Inventory Management
        description: >-
          Dealers manage product catalogs, check stock availability, and
          replenish inventory across Watsco's distributor network.
      - name: Equipment Replacement and Retrofit
        description: >-
          Contractors identify compatible replacement equipment and components
          for HVAC systems upgrades and energy efficiency retrofits.
      - name: Refrigerant Supply
        description: >-
          Procurement of refrigerants and refrigeration equipment for commercial
          and residential cooling systems.
  - type: Integrations
    data:
      - name: Carrier HVAC Equipment
        description: >-
          Carrier Enterprise, a Watsco subsidiary, distributes Carrier, Bryant,
          and Payne branded HVAC equipment.
      - name: Magento Commerce
        description: >-
          Watsco's B2B e-commerce platforms are built on Magento Commerce 2 with
          B2B sales module.
      - name: Alert Labs IoT
        description: >-
          Alert Labs monitoring technology integrates with HVAC equipment for
          real-time performance tracking and alerts.
