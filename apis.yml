aid: watsco
name: Watsco
description: >-
  Watsco, Inc. is the world's largest distributor of air conditioning, heating,
  and refrigeration (HVAC/R) equipment and related products. Operating through
  subsidiaries including Carrier Enterprise, Baker Distributing, Gemaire
  Distributors, and East Coast Metal Distributors, Watsco serves contractors
  and dealers across more than 670 locations in the US, Canada, Mexico, and the
  Caribbean. The company has undergone significant digital transformation,
  running a unified B2B e-commerce platform powered by Magento Commerce and a
  centralized PIM system covering approximately 900,000 SKUs.
